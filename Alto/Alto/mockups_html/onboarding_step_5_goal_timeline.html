<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alto – Step 5: Goal & Timeline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #1a1108;
      --surface:     #231809;
      --card:        #2c1f10;
      --border:      #4a3018;
      --primary:     #f48c25;
      --primary-dim: rgba(244,140,37,0.12);
      --text:        #f0ede8;
      --muted:       #7a7870;
      --danger:      #f87171;
    }

    body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: "Space Grotesk", ui-sans-serif, system-ui;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .shell {
      max-width: 420px;
      margin: 0 auto;
      padding: 28px 20px 60px;
      position: relative;
    }

    .bg-figure {
      position: absolute; top: -10px; right: -20px;
      width: 180px; pointer-events: none; z-index: 0;
    }

    .content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; gap: 20px;
    }

    /* ── Progress ── */
    .progress-track { display: flex; gap: 6px; }
    .progress-pill  { flex: 1; height: 4px; border-radius: 9999px; background: var(--border); }
    .progress-pill.active { background: var(--primary); }

    /* ── Header ── */
    .step-label {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--primary); margin-bottom: 6px;
    }
    .step-title    { font-size: 30px; font-weight: 800; line-height: 1.15; }
    .step-subtitle { font-size: 14px; color: var(--muted); margin-top: 6px; line-height: 1.5; }

    /* ── Goal card ── */
    .goal-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .goal-card.removing {
      animation: slideOut 0.25s ease forwards;
    }
    @keyframes slideOut {
      to { opacity: 0; transform: translateY(-6px); max-height: 0; padding: 0; margin: 0; }
    }

    /* card header bar */
    .goal-card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px 0;
    }
    .goal-number {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--primary);
    }
    .btn-remove {
      width: 26px; height: 26px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--muted); font-size: 14px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0;
      line-height: 1;
    }
    .btn-remove:hover { border-color: var(--danger); color: var(--danger); background: rgba(248,113,113,0.08); }

    .goal-card-body { padding: 10px 18px 16px; display: flex; flex-direction: column; gap: 12px; }

    /* ── Field label ── */
    .field-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.13em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px; display: block;
    }

    /* ── Text input ── */
    .text-input {
      width: 100%; background: var(--surface);
      border: 1px solid var(--border); border-radius: 10px;
      color: #c8a97e; font-family: inherit; font-size: 15px; font-weight: 600;
      padding: 11px 14px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .text-input::placeholder { color: var(--muted); font-weight: 400; }
    .text-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(244,140,37,0.15);
    }
    .text-input.error { border-color: var(--danger); }
    .text-input:-webkit-autofill,
    .text-input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px var(--surface) inset;
      box-shadow: 0 0 0 1000px var(--surface) inset;
      -webkit-text-fill-color: #c8a97e;
    }

    /* ── Suggestions ── */
    .suggestion-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .suggestion-chip {
      padding: 5px 11px; border-radius: 9999px;
      border: 1.5px solid var(--border); background: var(--surface);
      color: var(--muted); font-family: inherit; font-size: 11px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .suggestion-chip:hover {
      border-color: var(--primary); color: var(--primary); background: var(--primary-dim);
    }

    /* ── Divider ── */
    .divider { height: 1px; background: var(--border); }

    /* ── Timeline row ── */
    .timeline-row { display: flex; align-items: center; gap: 10px; }

    .stepper { display: flex; align-items: center; }
    .stepper-btn {
      width: 34px; height: 36px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--muted); font-size: 15px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0;
    }
    .stepper-btn:hover { border-color: var(--primary); color: var(--text); }
    .stepper-btn.plus {
      border-color: rgba(244,140,37,0.4);
      background: rgba(244,140,37,0.10); color: var(--primary);
    }
    .stepper-btn.plus:hover { background: rgba(244,140,37,0.18); }

    .stepper-val {
      width: 48px; height: 36px; text-align: center;
      font-size: 16px; font-weight: 800; font-family: inherit; color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border); border-left: none; border-right: none;
      outline: none; -moz-appearance: textfield; appearance: textfield;
    }
    .stepper-val::-webkit-inner-spin-button,
    .stepper-val::-webkit-outer-spin-button { -webkit-appearance: none; }
    .stepper-val:focus { color: var(--primary); background: #2e1f0e; }

    .unit-toggle { display: flex; gap: 5px; }
    .unit-btn {
      padding: 7px 13px; border-radius: 9999px;
      border: 1.5px solid var(--border); background: var(--surface);
      color: var(--muted); font-family: inherit; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .unit-btn:hover { border-color: var(--primary); color: var(--text); }
    .unit-btn.active { border-color: var(--primary); background: var(--primary-dim); color: var(--primary); }

    /* ── Date preview chip ── */
    .date-preview {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 9999px; padding: 6px 12px;
      font-size: 12px; font-weight: 600; color: var(--muted);
    }
    .date-preview span { color: var(--primary); }

    /* ── Add goal button ── */
    .btn-add-goal {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 14px;
      border-radius: 14px;
      border: 1.5px dashed var(--border);
      background: transparent;
      color: var(--muted); font-family: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-add-goal:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-dim); }

    /* ── Summary strip ── */
    .summary-strip {
      background: var(--primary-dim);
      border: 1.5px solid rgba(244,140,37,0.35);
      border-radius: 14px;
      padding: 14px 18px;
      display: none;
      flex-direction: column;
      gap: 8px;
    }
    .summary-strip.visible { display: flex; }
    .summary-strip-title {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--primary);
    }
    .summary-goal-row {
      display: flex; align-items: center; gap: 10px;
    }
    .summary-goal-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--primary); flex-shrink: 0;
    }
    .summary-goal-text { font-size: 13px; font-weight: 600; color: var(--text); }
    .summary-goal-date { font-size: 12px; color: var(--muted); margin-left: auto; flex-shrink: 0; }

    /* ── Nav ── */
    .nav { display: flex; gap: 10px; }
    .btn-back {
      padding: 14px 20px; border-radius: 12px;
      border: 1.5px solid var(--border); background: transparent;
      color: var(--muted); font-family: inherit; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-back:hover { border-color: var(--text); color: var(--text); }
    .btn-finish {
      flex: 1; padding: 14px; border-radius: 12px;
      border: none; background: var(--primary);
      color: #1a1108; font-family: inherit; font-size: 15px; font-weight: 800;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    }
    .btn-finish:hover  { opacity: 0.9; }
    .btn-finish:active { transform: scale(0.98); }
    .btn-finish:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
<div class="shell">

  <svg class="bg-figure" viewBox="0 0 160 340" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="#f48c25" stop-opacity="0.11"/>
        <stop offset="100%" stop-color="#f48c25" stop-opacity="0.01"/>
      </linearGradient>
    </defs>
    <circle cx="90" cy="32" r="20" fill="url(#g)"/>
    <path d="M104 20 Q118 8 114 26" stroke="url(#g)" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M74 52 Q68 82 66 112 L114 112 Q112 82 106 52 Z" fill="url(#g)"/>
    <path d="M74 62 Q56 38 44 26" stroke="url(#g)" stroke-width="12" stroke-linecap="round" fill="none"/>
    <path d="M106 62 Q124 38 136 26" stroke="url(#g)" stroke-width="12" stroke-linecap="round" fill="none"/>
    <path d="M82 112 Q70 160 66 210 Q62 240 70 275" stroke="url(#g)" stroke-width="14" stroke-linecap="round" fill="none"/>
    <path d="M98 112 Q110 160 114 210 Q118 240 110 275" stroke="url(#g)" stroke-width="14" stroke-linecap="round" fill="none"/>
  </svg>

  <div class="content">

    <div class="progress-track">
      <div class="progress-pill active"></div>
      <div class="progress-pill active"></div>
      <div class="progress-pill active"></div>
      <div class="progress-pill active"></div>
      <div class="progress-pill active"></div>
    </div>

    <div>
      <p class="step-label">Step 5 of 5</p>
      <h1 class="step-title">Goal & Timeline</h1>
      <p class="step-subtitle">Add one or more goals — each with its own target date.</p>
    </div>

    <!-- Goal cards injected here -->
    <div id="goals-container"></div>

    <!-- Add goal button -->
    <button class="btn-add-goal" id="btn-add" onclick="addGoal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add another goal
    </button>

    <!-- Summary strip -->
    <div class="summary-strip" id="summary-strip">
      <p class="summary-strip-title">🎯 Your Goals</p>
      <div id="summary-list"></div>
    </div>

    <div class="nav">
      <button class="btn-back">← Back</button>
      <button class="btn-finish" id="btn-finish" onclick="finish()">🚀 Let's Go</button>
    </div>

  </div>
</div>

<script>
  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jun','Aug','Sep','Oct','Nov','Dec'];
  const SUGGESTIONS = ['🏅 Marathon','⚡ Hyrox','🔥 Lose weight','💪 Build muscle','🏃‍♀️ 5K run','✨ Get fit','🏋️ Strength','🧘 Flexibility'];

  let goalCount = 0;
  const goals   = {}; // id → { unit }

  function targetDate(val, unit) {
    const d = new Date();
    if (unit === 'weeks') d.setDate(d.getDate() + val * 7);
    else                  d.setMonth(d.getMonth() + val);
    return `${MONTH_NAMES[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
  }

  function maxFor(unit) { return unit === 'weeks' ? 52 : 24; }

  function addGoal() {
    goalCount++;
    const id  = goalCount;
    goals[id] = { unit: 'months' };

    const container = document.getElementById('goals-container');

    const card = document.createElement('div');
    card.className  = 'goal-card';
    card.id         = 'goal-card-' + id;
    card.style.marginBottom = '10px';
    card.innerHTML  = `
      <div class="goal-card-header">
        <span class="goal-number">Goal ${id}</span>
        ${id > 1 ? `<button class="btn-remove" onclick="removeGoal(${id})" title="Remove">✕</button>` : '<span></span>'}
      </div>
      <div class="goal-card-body">

        <!-- Goal name -->
        <div>
          <span class="field-label">What's your goal? *</span>
          <input
            id="goal-input-${id}"
            class="text-input"
            placeholder="e.g. Run a marathon, Lose 10kg…"
            maxlength="60"
            oninput="onGoalInput(${id})"
          />
        </div>

        <!-- Suggestions -->
        <div class="suggestion-row" id="suggestions-${id}">
          ${SUGGESTIONS.map(s => `<button class="suggestion-chip" onclick="setGoal(${id}, '${s.replace(/'/g,"\\'")}')"> ${s}</button>`).join('')}
        </div>

        <div class="divider"></div>

        <!-- Timeline -->
        <div>
          <span class="field-label">Timeline *</span>
          <div class="timeline-row">
            <div class="stepper">
              <button class="stepper-btn" onclick="adjustTime(${id}, -1)">−</button>
              <input class="stepper-val" id="time-val-${id}" type="number" value="4" min="1" max="24"
                onblur="clampTime(${id})" oninput="onTimeInput(${id})" />
              <button class="stepper-btn plus" onclick="adjustTime(${id}, 1)">+</button>
            </div>
            <div class="unit-toggle">
              <button class="unit-btn" id="unit-weeks-${id}"  onclick="setUnit(${id}, 'weeks')">Weeks</button>
              <button class="unit-btn active" id="unit-months-${id}" onclick="setUnit(${id}, 'months')">Months</button>
            </div>
          </div>
        </div>

        <!-- Target date -->
        <div class="date-preview">
          📅 Target: <span id="date-preview-${id}">—</span>
        </div>

      </div>
    `;

    container.appendChild(card);
    refreshDatePreview(id);
    updateSummary();
    updateAddButton();

    // focus the new goal input
    setTimeout(() => document.getElementById('goal-input-' + id).focus(), 50);
  }

  function removeGoal(id) {
    const card = document.getElementById('goal-card-' + id);
    card.classList.add('removing');
    setTimeout(() => {
      card.remove();
      delete goals[id];
      updateSummary();
      updateAddButton();
    }, 240);
  }

  function setGoal(id, text) {
    // strip emoji prefix from suggestion
    const clean = text.replace(/^[\p{Emoji}\s]+/u, '').trim();
    document.getElementById('goal-input-' + id).value = clean;
    onGoalInput(id);
  }

  function onGoalInput(id) { updateSummary(); }

  function setUnit(id, unit) {
    goals[id].unit = unit;
    document.getElementById('unit-weeks-'  + id).classList.toggle('active', unit === 'weeks');
    document.getElementById('unit-months-' + id).classList.toggle('active', unit === 'months');
    const input = document.getElementById('time-val-' + id);
    const max   = maxFor(unit);
    input.max   = max;
    if (parseInt(input.value) > max) input.value = max;
    refreshDatePreview(id);
    updateSummary();
  }

  function adjustTime(id, delta) {
    const input = document.getElementById('time-val-' + id);
    input.value = Math.min(maxFor(goals[id].unit), Math.max(1, (parseInt(input.value) || 1) + delta));
    refreshDatePreview(id);
    updateSummary();
  }

  function clampTime(id) {
    const input = document.getElementById('time-val-' + id);
    input.value = Math.min(maxFor(goals[id].unit), Math.max(1, parseInt(input.value) || 1));
    refreshDatePreview(id);
    updateSummary();
  }

  function onTimeInput(id) {
    refreshDatePreview(id);
    updateSummary();
  }

  function refreshDatePreview(id) {
    const val  = parseInt(document.getElementById('time-val-' + id).value) || 1;
    const unit = goals[id].unit;
    document.getElementById('date-preview-' + id).textContent = targetDate(val, unit);
  }

  function updateSummary() {
    const strip = document.getElementById('summary-strip');
    const list  = document.getElementById('summary-list');
    const ids   = Object.keys(goals);

    const filled = ids.filter(id => {
      const g = document.getElementById('goal-input-' + id);
      return g && g.value.trim().length > 0;
    });

    if (filled.length === 0) { strip.classList.remove('visible'); return; }

    strip.classList.add('visible');
    list.innerHTML = filled.map(id => {
      const name = document.getElementById('goal-input-' + id).value.trim();
      const date = document.getElementById('date-preview-' + id).textContent;
      return `
        <div class="summary-goal-row">
          <span class="summary-goal-dot"></span>
          <span class="summary-goal-text">${name}</span>
          <span class="summary-goal-date">${date}</span>
        </div>`;
    }).join('');
  }

  function updateAddButton() {
    const count = Object.keys(goals).length;
    document.getElementById('btn-add').style.display = count >= 5 ? 'none' : '';
  }

  function finish() {
    const ids     = Object.keys(goals);
    const invalid = ids.filter(id => {
      const g = document.getElementById('goal-input-' + id);
      return !g || !g.value.trim();
    });

    invalid.forEach(id => {
      const input = document.getElementById('goal-input-' + id);
      input.classList.add('error');
      input.focus();
      setTimeout(() => input.classList.remove('error'), 1500);
    });

    if (invalid.length > 0) return;
    if (ids.length === 0)   { addGoal(); return; }

    const btn = document.getElementById('btn-finish');
    btn.disabled    = true;
    btn.textContent = '✓  Saved — heading to dashboard…';
    setTimeout(() => { btn.disabled = false; btn.textContent = '🚀 Let\'s Go'; }, 2500);
  }

  // Start with one goal on load
  addGoal();
</script>
</body>
</html>
